name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Module version
      description: Which version of the module are you using?
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal configuration or steps to reproduce the issue.
      render: hcl
    validations:
      required: true

  - type: textarea
    id: versions
    attributes:
      label: Environment
      description: Output of `tofu version` and relevant component versions.
      render: shell
    validations:
      required: false
